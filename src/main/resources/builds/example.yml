# 是否启用该配置
enable: false

# 世界配置
worlds:
  # 配置可用世界白名单，留空则在所有世界可用
  whitelist: []
  # 配置可用世界黑名单
  blacklist: []

# 方块结构定义
block-layers:
  # 每一层使用什么方块
  layers:
    0:
      - ' a '
      - 'bbb'
      - ' b '
  defines:
    a:
      type: Vanilla
      material: CARVED_PUMPKIN
    b:
      type: Vanilla
      material: DIAMOND_BLOCK
  # 需要结构朝向哪边才能召唤生物，可用值有 NORTH, SOUTH, EAST, WEST
  # 留空则朝向任意方向均可触发召唤
  require-facing: []

# 触发点击物品
trigger-item:
  # 指定物品
  item:
    type: MythicMobs
    mythic: ExampleItem
  # 需要点击 block-layers.defines 中的哪种方块才能触发生成
  # 留空则点击其中的任意方块都可以触发
  require-blocks: []
  # 需要以什么方式点击方块才能触发生成，可用值有 LEFT, RIGHT, SHIFT_LEFT, SHIFT_RIGHT
  # 留空则以任意方式点击方块都可以触发
  require-actions: [ RIGHT ]

# 生成操作
spawn-actions:
  # 消耗物品数量
  cost-items:
    count: 1
    deny-actions:
      - message: '&e至少需要%count%个物品来召唤'
  # 需要移除什么方块，任意一项为 * 则代表移除所有方块
  remove-blocks: [ '*' ]
  # 怪物生成位置配置
  location:
    type: CENTER_BOTTOM
    offset:
      x: 0.5
      y: 0.5
      z: 0.5
  # 生成怪物类型，方便调整起见，只支持生成一个怪物
  # 如需多个怪物，请通过一个 MythicMobs 怪物的技能来生成多个怪物
  mob-type:
    type: MythicMobs
    mythic: ExampleMob
  # 条件均满足时，生成怪物前执行的命令，除了支持 PAPI 变量外，额外支持以下变量
  # %mob_x% - 已指定的怪物X坐标
  # %mob_y% - 已指定的怪物Y坐标
  # %mob_z% - 已指定的怪物Z坐标
  # %mob_x_block% - 已指定的怪物X坐标(整数)
  # %mob_y_block% - 已指定的怪物Y坐标(整数)
  # %mob_z_block% - 已指定的怪物Z坐标(整数)
  pre-actions: []
  # 条件均满足时，生成怪物后执行的命令
  # 变量支持情况同上
  post-actions:
    - message: '&b你召唤了示例怪物'
